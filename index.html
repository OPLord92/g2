<!DOCTYPE html>
<html>
<head>
<title>Money Saving Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>


<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}


.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}


h2{
    text-align:center;
}


input,select,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    font-size:16px;
}


button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}


button:hover{
    background:#0056b3;
}


.summary{
    display:flex;
    gap:10px;
    margin-top:20px;
}


.box{
    flex:1;
    color:white;
    padding:15px;
    text-align:center;
    border-radius:8px;
}


.saving{
    background:green;
}


.expense{
    background:red;
}


.balance{
    background:#333;
}


ul{
    padding:0;
}


li{
    list-style:none;
    background:#eee;
    margin:8px 0;
    padding:12px;
    border-radius:5px;
}


.delete{
    float:right;
    color:red;
    cursor:pointer;
}


.date{
    color:#555;
    font-size:13px;
}

</style>

</head>


<body>


<div class="container">


<h2>💰 Money Saving Tracker</h2>


<input id="name" placeholder="Personal Name">


<input id="amount" 
type="number" 
placeholder="Amount">


<select id="type">

<option value="income">
Add Savings (+)
</option>

<option value="expense">
Add Expense (-)
</option>

</select>


<input id="desc" placeholder="Purpose">


<input id="date" type="date">


<button id="addBtn">
Add Transaction
</button>



<div class="summary">


<div class="box saving">

<h4>Total Savings</h4>

<p id="income">
0
</p>

</div>



<div class="box expense">

<h4>Total Expense</h4>

<p id="expense">
0
</p>

</div>



<div class="box balance">

<h4>Balance</h4>

<p id="balance">
0
</p>

</div>


</div>


<h3>
Transaction History
</h3>


<ul id="list"></ul>


</div>





<script>


// ===============================
// FIREBASE CONFIG
// REPLACE WITH YOUR OWN
// ===============================


var firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_PROJECT.firebaseapp.com",

projectId:"YOUR_PROJECT_ID"

};



firebase.initializeApp(firebaseConfig);


var db=firebase.firestore();



let transactions=[];



// ===============================
// LOAD DATA
// ===============================


function loadData(){


db.collection("transactions")

.onSnapshot(snapshot=>{


transactions=[];


snapshot.forEach(doc=>{


let data=doc.data();


transactions.push({

id:doc.id,

...data

});


});



// SORT OLD DATE TO NEW DATE

transactions.sort(function(a,b){


return new Date(a.date) - new Date(b.date);


});


render();


});


}





// ===============================
// ADD TRANSACTION
// ===============================


document
.getElementById("addBtn")
.addEventListener("click",function(){



let name=
document.getElementById("name").value;



let amount=
document.getElementById("amount").value;



let type=
document.getElementById("type").value;



let desc=
document.getElementById("desc").value;



let date=
document.getElementById("date").value;



if(
!name ||
!amount ||
!desc ||
!date
){

alert("Please fill all fields");

return;

}



db.collection("transactions")
.add({


name:name,


amount:Number(amount),


type:type,


desc:desc,


date:date


});



document.getElementById("amount").value="";

document.getElementById("desc").value="";


});





// ===============================
// DELETE
// ===============================


function deleteTransaction(id){


db.collection("transactions")
.doc(id)
.delete();


}





// ===============================
// DISPLAY
// ===============================


function render(){


let list=
document.getElementById("list");


list.innerHTML="";



let income=0;

let expense=0;



transactions.forEach(t=>{


let li=document.createElement("li");



li.innerHTML=`

<div class="date">

📅 ${t.date}

</div>


<b>${t.name}</b>

<br>


${t.desc}


<br>


${t.type=="income" ? "+" : "-"}

RM ${t.amount}


<span class="delete">

❌

</span>

`;



li.querySelector(".delete")
.onclick=function(){

deleteTransaction(t.id);

};



list.appendChild(li);



if(t.type=="income"){

income+=t.amount;

}

else{

expense+=t.amount;

}



});



document.getElementById("income")
.innerHTML="RM "+income.toFixed(2);



document.getElementById("expense")
.innerHTML="RM "+expense.toFixed(2);



document.getElementById("balance")
.innerHTML="RM "+(income-expense).toFixed(2);



}




loadData();



</script>


</body>
</html>
