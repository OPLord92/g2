<!DOCTYPE html>
<html>
<head>
    <title>Money Saving Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover { background: #0056b3; }

        .summary {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .box {
            width: 30%;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            color: white;
        }

        .saving { background: green; }
        .expense { background: red; }
        .balance { background: #333; }

        ul { list-style: none; padding: 0; }

        li {
            padding: 10px;
            margin: 5px 0;
            background: #eee;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        .delete {
            color: red;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💰 Money Saving Tracker</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="amount" placeholder="Enter Amount">

    <select id="type">
        <option value="income">Add Savings (+)</option>
        <option value="expense">Add Expense (-)</option>
    </select>

    <input type="text" id="desc" placeholder="Purpose">

    <button id="addBtn">Add</button>

    <div class="summary">
        <div class="box saving">
            <h4>Savings</h4>
            <p id="totalIncome">0</p>
        </div>
        <div class="box expense">
            <h4>Expenses</h4>
            <p id="totalExpense">0</p>
        </div>
        <div class="box balance">
            <h4>Balance</h4>
            <p id="balance">0</p>
        </div>
    </div>

    <h3>Transaction History</h3>
    <ul id="list"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 REPLACE THIS
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOCAL STORAGE BACKUP
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

// LOAD DATA
async function loadData() {
    try {
        const querySnapshot = await getDocs(collection(db, "transactions"));
        transactions = [];

        querySnapshot.forEach((docSnap) => {
            transactions.push({ id: docSnap.id, ...docSnap.data() });
        });

        saveLocal();
    } catch (err) {
        console.log("Using local storage");
    }

    updateUI();
}

loadData();

// ADD TRANSACTION
async function addTransaction() {
    let name = document.getElementById("name").value;
    let amount = document.getElementById("amount").value;
    let type = document.getElementById("type").value;
    let desc = document.getElementById("desc").value;

    if (!name || !amount || !desc) {
        alert("Please fill all fields");
        return;
    }

    let newData = {
        name,
        amount: parseFloat(amount),
        type,
        desc
    };

    try {
        await addDoc(collection(db, "transactions"), newData);
        loadData();
    } catch (err) {
        // fallback
        newData.id = Date.now().toString();
        transactions.push(newData);
        saveLocal();
        updateUI();
    }

    document.getElementById("amount").value = "";
    document.getElementById("desc").value = "";
}

// DELETE
async function deleteTransaction(id) {
    try {
        await deleteDoc(doc(db, "transactions", id));
        loadData();
    } catch (err) {
        transactions = transactions.filter(t => t.id !== id);
        saveLocal();
        updateUI();
    }
}

// UPDATE UI
function updateUI() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let income = 0;
    let expense = 0;

    transactions.forEach(t => {
        let li = document.createElement("li");

        li.innerHTML = `
            ${t.name} - ${t.desc} :
            ${t.type === "income" ? "+" : "-"} RM${t.amount}
            <span class="delete" data-id="${t.id}">X</span>
        `;

        // DELETE BUTTON EVENT
        li.querySelector(".delete").addEventListener("click", () => {
            deleteTransaction(t.id);
        });

        list.appendChild(li);

        if (t.type === "income") income += t.amount;
        else expense += t.amount;
    });

    document.getElementById("totalIncome").innerText = "RM " + income.toFixed(2);
    document.getElementById("totalExpense").innerText = "RM " + expense.toFixed(2);
    document.getElementById("balance").innerText = "RM " + (income - expense).toFixed(2);
}

// SAVE LOCAL
function saveLocal() {
    localStorage.setItem("transactions", JSON.stringify(transactions));
}

// ✅ FIXED BUTTON (IMPORTANT)
document.getElementById("addBtn").addEventListener("click", addTransaction);

</script>

</body>
</html>
