<!DOCTYPE html>
<html>
<head>
    <title>Money Saving Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial; background: #f4f6f9; padding: 20px; }
        .container {
            max-width: 600px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        input, select, button {
            width:100%;
            padding:10px;
            margin:8px 0;
        }
        button {
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }
        .summary { display:flex; justify-content:space-between; }
        .box {
            width:30%;
            padding:10px;
            color:white;
            text-align:center;
        }
        .saving { background:green; }
        .expense { background:red; }
        .balance { background:black; }
        li {
            background:#eee;
            margin:5px 0;
            padding:10px;
            display:flex;
            justify-content:space-between;
        }
        .delete { color:red; cursor:pointer; }
    </style>
</head>

<body>

<div class="container">
    <h2>💰 Money Tracker</h2>

    <input id="name" placeholder="Name">
    <input id="amount" type="number" placeholder="Amount">

    <select id="type">
        <option value="income">Savings (+)</option>
        <option value="expense">Expense (-)</option>
    </select>

    <input id="desc" placeholder="Purpose">

    <button id="addBtn">Add</button>

    <div class="summary">
        <div class="box saving">
            <h4>Savings</h4>
            <p id="income">0</p>
        </div>
        <div class="box expense">
            <h4>Expenses</h4>
            <p id="expense">0</p>
        </div>
        <div class="box balance">
            <h4>Balance</h4>
            <p id="balance">0</p>
        </div>
    </div>

    <ul id="list"></ul>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("data")) || [];

// ADD BUTTON FIX
document.getElementById("addBtn").addEventListener("click", function () {

    let name = document.getElementById("name").value;
    let amount = document.getElementById("amount").value;
    let type = document.getElementById("type").value;
    let desc = document.getElementById("desc").value;

    if (!name || !amount || !desc) {
        alert("Fill all fields");
        return;
    }

    let t = {
        id: Date.now(),
        name,
        amount: parseFloat(amount),
        type,
        desc
    };

    transactions.push(t);
    save();
    render();

    document.getElementById("amount").value = "";
    document.getElementById("desc").value = "";
});

// DELETE
function deleteItem(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
}

// SAVE
function save() {
    localStorage.setItem("data", JSON.stringify(transactions));
}

// RENDER
function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let income = 0, expense = 0;

    transactions.forEach(t => {
        let li = document.createElement("li");

        li.innerHTML = `
            ${t.name} - ${t.desc} :
            ${t.type === "income" ? "+" : "-"} RM${t.amount}
            <span class="delete" onclick="deleteItem(${t.id})">X</span>
        `;

        list.appendChild(li);

        if (t.type === "income") income += t.amount;
        else expense += t.amount;
    });

    document.getElementById("income").innerText = income.toFixed(2);
    document.getElementById("expense").innerText = expense.toFixed(2);
    document.getElementById("balance").innerText = (income - expense).toFixed(2);
}

// INIT
render();
</script>

</body>
</html>
