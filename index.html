<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Money Saving Tracker</title>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>


<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}


.container{
max-width:650px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}


input,select,button{

width:100%;
padding:12px;
margin:8px 0;
box-sizing:border-box;
font-size:16px;

}


button{

background:#007bff;
color:white;
border:none;
cursor:pointer;

}


.summary{

display:flex;
gap:10px;
margin-top:20px;

}


.box{

flex:1;
padding:12px;
text-align:center;
color:white;
border-radius:8px;

}


.saving{
background:green;
}


.expenses{
background:red;
}


.balance{
background:black;
}



ul{

list-style:none;
padding:0;
margin-top:20px;

}


li{

background:#eee;
margin:8px 0;
padding:12px;

display:flex;
justify-content:space-between;
align-items:center;

border-radius:8px;

font-size:14px;

}




/* DELETE BUTTON */

.delete{

cursor:pointer;
font-size:22px;
display:inline-block;
transition:transform .2s;

}


.delete:hover{

animation:bounce .5s ease;
transform:scale(1.3);

}



@keyframes bounce{

0%{
transform:scale(1);
}

30%{
transform:scale(1.4);
}

50%{
transform:scale(.9);
}

70%{
transform:scale(1.2);
}

100%{
transform:scale(1.3);
}

}



/* OPENING BALANCE STYLE */

.opening{

background:#fff3cd;
border-left:5px solid orange;

}



</style>


</head>


<body>


<div class="container">


<h2>💰 Money Tracker</h2>



<select id="name">

<option value="Gary">
Gary
</option>


<option value="Kiki">
Kiki
</option>


</select>



<input id="amount" type="number" placeholder="Amount">



<select id="type">

<option value="income">
Savings (+)
</option>


<option value="expense">
Expenses (-)
</option>


</select>



<input id="desc" placeholder="Purpose">



<button id="addBtn">
Add
</button>





<div class="summary">


<div class="box saving">

<h4>Savings</h4>

<p id="income">
0.00
</p>

</div>




<div class="box expenses">

<h4>Expenses</h4>

<p id="expense">
0.00
</p>

</div>




<div class="box balance">

<h4>Balance</h4>

<p id="balance">
0.00
</p>

</div>


</div>




<ul id="list"></ul>



</div>





<script>


const firebaseConfig = {

apiKey:"AIzaSyBjuMqepGhn6MZLv1OFBMlQFNVDrDjr7V4",

authDomain:"oplord-savings.firebaseapp.com",

projectId:"oplord-savings",

storageBucket:"oplord-savings.firebasestorage.app",

messagingSenderId:"1794473489",

appId:"1:1794473489:web:6056cb5e3cef91bb60bbb0"

};



let db=null;



try{

firebase.initializeApp(firebaseConfig);

db=firebase.firestore();

}

catch(e){

console.log("Firebase unavailable");

}



let transactions =
JSON.parse(localStorage.getItem("moneyData")) || [];


// ADD TRANSACTION

document.getElementById("addBtn")
.addEventListener("click",function(){


let name=document.getElementById("name").value;

let amount=document.getElementById("amount").value;

let type=document.getElementById("type").value;

let desc=document.getElementById("desc").value.trim();



let date=new Date().toLocaleDateString("en-GB");



if(!amount || !desc){

alert("Fill all fields");

return;

}



let t={

name:name,

date:date,

amount:parseFloat(amount),

type:type,

desc:desc

};




if(db){


db.collection("transactions")
.add(t)
.then(loadFromFirebase)
.catch(()=>saveLocal(t));


}
else{


saveLocal(t);


}



clearInputs();



});






function clearInputs(){


document.getElementById("amount").value="";

document.getElementById("desc").value="";


}








// SAVE LOCAL

function saveLocal(t){


t.id=Date.now();


transactions.push(t);



localStorage.setItem(
"moneyData",
JSON.stringify(transactions)
);



render();


}









// DELETE TRANSACTION

function deleteItem(id){



if(db && typeof id==="string"){



db.collection("transactions")
.doc(id)
.delete()
.then(loadFromFirebase)
.catch(()=>deleteLocal(id));



}

else{


deleteLocal(id);


}



}






function deleteLocal(id){



transactions =
transactions.filter(item=>item.id!=id);



localStorage.setItem(
"moneyData",
JSON.stringify(transactions)
);



render();



}









// CREATE MONTHLY OPENING BALANCE


function createOpeningBalance(){



let now=new Date();



let currentMonth=now.getMonth();

let currentYear=now.getFullYear();




let openingKey=
"opening_"+currentYear+"_"+currentMonth;



// already created

if(localStorage.getItem(openingKey)){

return;

}




let balance=0;



// calculate current balance

transactions.forEach(t=>{


if(t.opening){

balance+=t.amount;

}

else if(t.type==="income"){

balance+=t.amount;

}

else{

balance-=t.amount;

}


});







let opening={


name:"System",


date:
"01/"+
String(currentMonth+1).padStart(2,"0")+
"/"+
currentYear,


amount:balance,


type:"income",


desc:"Opening Balance",


id:openingKey,


opening:true



};






transactions.push(opening);





localStorage.setItem(
openingKey,
JSON.stringify(opening)
);



localStorage.setItem(
"moneyData",
JSON.stringify(transactions)
);

}


// LOAD FIREBASE

function loadFromFirebase(){


if(!db){

createOpeningBalance();

render();

return;

}




db.collection("transactions")
.get()

.then(snapshot=>{


transactions=[];



snapshot.forEach(doc=>{


transactions.push({

id:doc.id,

...doc.data()

});


});




// create opening balance

createOpeningBalance();



localStorage.setItem(
"moneyData",
JSON.stringify(transactions)
);



render();



})

.catch(()=>{


createOpeningBalance();

render();


});



}









// RENDER LIST

function render(){


let list=document.getElementById("list");


list.innerHTML="";



let income=0;

let expense=0;





// LATEST DATE FIRST

transactions.sort((a,b)=>{


// opening balance always top

if(a.opening) return -1;

if(b.opening) return 1;



let dateA=a.date.split("/").reverse().join("-");

let dateB=b.date.split("/").reverse().join("-");



return new Date(dateB)-new Date(dateA);



});







transactions.forEach(t=>{



let li=document.createElement("li");




// opening balance style

if(t.opening){

li.className="opening";

}




li.innerHTML=`

<span>


${t.opening ? "📌" : "📅"}

${t.date}

|

<b>${t.name}</b>

|

${t.desc}

(${t.type==="income" ? "+" : "-"}RM${t.amount.toFixed(2)})



</span>


<span class="delete">

🗑️

</span>


`;







// hide delete for opening balance

if(t.opening){


li.querySelector(".delete")
.style.display="none";


}

else{


li.querySelector(".delete")
.addEventListener(
"click",
()=>deleteItem(t.id)
);



}







list.appendChild(li);








if(t.type==="income"){


income+=t.amount;


}

else{


expense+=t.amount;


}

});

document.getElementById("income")
.innerText=income.toFixed(2);



document.getElementById("expense")
.innerText=expense.toFixed(2);



document.getElementById("balance")
.innerText=(income-expense).toFixed(2);

}

// START APPLICATION

loadFromFirebase();

</script>
</body>
</html>
