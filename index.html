<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

updateUI();

function addTransaction() {
    let name = document.getElementById("name").value;
    let amount = document.getElementById("amount").value;
    let type = document.getElementById("type").value;
    let desc = document.getElementById("desc").value;

    if (name === "" || amount === "" || desc === "") {
        alert("Please fill all fields");
        return;
    }

    let transaction = {
        id: Date.now(),
        name: name,
        amount: parseFloat(amount),
        type: type,
        desc: desc
    };

    transactions.push(transaction);

    saveData();
    updateUI();

    document.getElementById("amount").value = "";
    document.getElementById("desc").value = "";
}

function updateUI() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let income = 0;
    let expense = 0;

    transactions.forEach(t => {
        let li = document.createElement("li");

        li.innerHTML = `
            ${t.name} - ${t.desc} :
            ${t.type === "income" ? "+" : "-"} RM${t.amount}
            <span class="delete" onclick="deleteTransaction(${t.id})">X</span>
        `;

        list.appendChild(li);

        if (t.type === "income") income += t.amount;
        else expense += t.amount;
    });

    document.getElementById("totalIncome").innerText = "RM " + income.toFixed(2);
    document.getElementById("totalExpense").innerText = "RM " + expense.toFixed(2);
    document.getElementById("balance").innerText = "RM " + (income - expense).toFixed(2);
}

function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    saveData();
    updateUI();
}

function saveData() {
    localStorage.setItem("transactions", JSON.stringify(transactions));
}
</script>
